{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <!-- Titre + bouton télécharger -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Curriculum Vitae</h1>
        <a href="{{ url_for('static', filename='CV-GEFFRAY.pdf') }}" 
           download="CV-GEFFRAY.pdf" 
           class="btn btn-dark">
            ⬇️ Télécharger mon CV
        </a>
    </div>

    <!-- Affichage du PDF directement dans la page -->
    <div class="border rounded shadow-sm">
        <iframe 
            src="{{ url_for('static', filename='CV-GEFFRAY.pdf') }}" 
            width="100%" 
            height="1000px"
            style="border: none;">
            Votre navigateur ne supporte pas l'affichage de PDF.
            <a href="{{ url_for('static', filename='CV-GEFFRAY.pdf') }}">Cliquez ici pour le télécharger.</a>
        </iframe>
    </div>

</div>
{% endblock %}
